name: Job Vacancy Manager

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 17
      - name: Build Project
        run: mvn clean install
      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Docker Image
        run: docker build -t caiquebrener/job_vacancy_manager .
      - name: Publish Image
        run: docker push caiquebrener/job_vacancy_manager
  deploy:
    needs: build
    runs-on: [ self-hosted, Linux, X64 ]
    steps:
      - name: Pull image docker hub
        run: docker pull caiquebrener/job_vacancy_manager:latest
      - name: Remove Container
        run: docker rm -f job_vacancy_manager || true
      - name: Run Docker Container
        run: |
          docker run -d -p 8080:8080 \
          -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
          -e DATABASE_PASSWORD='${{ secrets.DATABASE_PASSWORD }}' \
          -e DATABASE_USERNAME='${{ secrets.DATABASE_USERNAME }}' \
          -e JWT_SECRET_CANDIDATE='${{ secrets.JWT_SECRET_CANDIDATE }}' \
          -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
          --name job_vacancy_manager \
          caiquebrener/job_vacancy_manager:latest