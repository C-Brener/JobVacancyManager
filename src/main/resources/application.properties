spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.application.name=job_vacancy_manager
spring.datasource.url=${DATABASE_URL}
# If you run the project through IntelliJ, you need to add the variables within the IDE.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
security.token.secret=${JWT_SECRET}
security.token.secret.candidate=${JWT_SECRET_CANDIDATE}
spring.jpa.hibernate.ddl-auto=update
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
token.sonar=${SONAR_SECRET}