spring.application.name=job_vacancy_manager
spring.datasource.url=jdbc:postgresql://localhost:5432/job_vacancy_manager
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
security.token.secret=${JWT_SECRET}
security.token.secret.candidate=${JWT_SECRET_CANDIDATE}
spring.jpa.hibernate.ddl-auto=update
# If you run the project through IntelliJ, you need to add the variables within the IDE.